name: Build, Test & SonarCloud

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore
        run: dotnet restore

      - name: Begin SonarCloud analysis
        run: >
          ~/.dotnet/tools/dotnet-sonarscanner begin
          /k:"BartSterrenburg_Sofa3"
          /o:"bartsterrenburg"
          /d:sonar.token="${SONAR_TOKEN}"
          /d:sonar.cs.opencover.reportsPaths="TestResults/**/coverage.opencover.xml"
          /d:sonar.cs.vstest.reportsPaths="TestResults/**/*.trx"

      - name: Build
        run: dotnet build --no-restore --no-incremental

      - name: Test with coverage
        run: >
          dotnet test
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=opencover
          /p:CoverletOutput=TestResults/

      - name: Show generated test and coverage files
        run: |
          echo "TRX files:"
          find TestResults -type f -name "*.trx" || true
          echo "Coverage files:"
          find TestResults -type f \( -name "coverage.opencover.xml" -o -name "*.xml" \) || true

      - name: End SonarCloud analysis
        run: >
          ~/.dotnet/tools/dotnet-sonarscanner end
          /d:sonar.token="${SONAR_TOKEN}"
