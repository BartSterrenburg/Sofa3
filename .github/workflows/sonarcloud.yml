name: Build, Test & SonarCloud

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install SonarScanner and dotnet-coverage
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet tool install --global dotnet-coverage

      - name: Restore
        run: dotnet restore

      - name: Begin SonarCloud analysis
        run: |
          ~/.dotnet/tools/dotnet-sonarscanner begin \
            /k:"BartSterrenburg_Sofa3" \
            /o:"bartsterrenburg" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.cs.vscoveragexml.reportsPaths="coverage.xml"

      - name: Build
        run: dotnet build --no-restore --no-incremental

      - name: Test with dotnet-coverage
        run: |
          ~/.dotnet/tools/dotnet-coverage collect "dotnet test --no-build" \
            -f xml \
            -o "coverage.xml"

      - name: Verify coverage file
        run: |
          ls -la
          test -f coverage.xml
          echo "coverage.xml found"

      - name: End SonarCloud analysis
        run: |
          ~/.dotnet/tools/dotnet-sonarscanner end \
            /d:sonar.token="${SONAR_TOKEN}"
